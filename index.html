<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Castle Quest: Retro RPG</title>
    <!-- Importing a retro pixel font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #00ff41;
            --neon-yellow: #fcee0a;
            --bg-dark: #0d0d15;
            --text-color: #ffffff;
            --danger-red: #ff3333;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-color);
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        /* --- Header --- */
        header {
            text-align: center;
            padding: 20px;
            text-shadow: 2px 2px 0px var(--neon-pink);
            animation: glow 2s infinite alternate;
            width: 100%;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--neon-blue);
        }

        .subtitle {
            font-size: 0.7rem;
            color: var(--neon-green);
        }

        /* --- Game Container (The World) --- */
        #game-stage {
            position: relative;
            width: 95%;
            max-width: 800px;
            height: 250px;
            background: linear-gradient(to bottom, #1a0b2e 0%, #2d1b4e 60%, #101020 60%);
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue), inset 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
            margin: 10px 0;
            border-radius: 4px;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background-image: 
                radial-gradient(white 1px, transparent 1px),
                radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px, 100px 100px;
            background-position: 0 0, 25px 25px;
            opacity: 0.5;
        }

        .mountains {
            position: absolute;
            bottom: 40%;
            width: 200%;
            height: 100px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20" preserveAspectRatio="none"><path d="M0 20 L20 0 L40 20 L60 5 L80 20 L100 10 L120 20 L140 0 L160 20 L180 10 L200 20 Z" fill="%233b1e5d" stroke="%23ff00ff" stroke-width="1"/></svg>');
            background-repeat: repeat-x;
            background-size: 50% 100%;
            transition: transform 1s linear;
            will-change: transform;
        }

        .castle-container {
            position: absolute;
            right: 20px;
            bottom: 40%;
            width: 80px;
            height: 100px;
            z-index: 5;
        }

        .castle-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 5px var(--neon-yellow));
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background-color: #1e1e2e;
            border-top: 4px solid var(--neon-green);
            background-image: 
                linear-gradient(45deg, #252535 25%, transparent 25%, transparent 75%, #252535 75%, #252535),
                linear-gradient(45deg, #252535 25%, transparent 25%, transparent 75%, #252535 75%, #252535);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            z-index: 10;
        }

        #hero {
            position: absolute;
            bottom: 40%;
            left: 10px;
            width: 40px;
            height: 40px;
            z-index: 20;
            transition: left 1s ease-in-out;
            will-change: left;
        }

        .hero-svg {
            width: 100%;
            height: 100%;
        }

        .walking .hero-svg {
            animation: bob 0.4s infinite alternate;
        }

        @keyframes bob {
            from { transform: translateY(0); }
            to { transform: translateY(-3px); }
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px var(--neon-blue); }
            to { text-shadow: 0 0 20px var(--neon-blue), 0 0 10px white; }
        }

        /* --- Controls & UI --- */
        .controls-container {
            width: 95%;
            max-width: 800px;
            background: rgba(0,0,0,0.8);
            border: 2px solid var(--neon-pink);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        label {
            color: var(--neon-yellow);
            font-size: 0.8rem;
        }

        input[type="number"] {
            background: #000;
            border: 2px solid var(--neon-blue);
            color: white;
            padding: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            width: 180px;
            text-align: center;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: var(--neon-yellow);
            box-shadow: 0 0 5px var(--neon-yellow);
        }

        button {
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--neon-pink);
            transition: transform 0.1s;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--neon-pink);
        }

        button:hover {
            background: #fff;
        }

        /* Red Reset Button */
        button.btn-reset {
            background: var(--danger-red);
            color: white;
            box-shadow: 4px 4px 0px #550000;
        }
        button.btn-reset:hover {
            background: #ff6666;
        }

        .status-panel {
            display: flex;
            justify-content: space-between;
            border-top: 1px dashed var(--neon-green);
            padding-top: 15px;
            font-size: 0.7rem;
            color: #ccc;
        }

        .status-item span {
            display: block;
            color: white;
            margin-top: 5px;
            font-size: 1rem;
        }

        /* --- Weekly Dashboard --- */
        .dashboard-container {
            width: 95%;
            max-width: 800px;
            margin-top: 20px;
            border: 2px solid var(--neon-green);
            padding: 15px;
            background: rgba(0, 20, 0, 0.6);
        }

        .dashboard-title {
            text-align: center;
            color: var(--neon-green);
            font-size: 0.8rem;
            margin-bottom: 15px;
            text-decoration: underline;
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 150px;
        }

        .day-label {
            font-size: 0.5rem;
            color: #aaa;
            margin-bottom: 5px;
            text-align: center;
            font-weight: bold;
        }
        
        /* Highlight the active day label */
        .day-label.active {
            color: var(--neon-yellow);
            text-shadow: 0 0 5px var(--neon-yellow);
        }

        .energy-box {
            width: 100%;
            height: 100%;
            background: #111;
            border: 2px solid #444;
            position: relative;
            display: flex;
            align-items: flex-end; /* Fill from bottom */
            overflow: hidden;
            box-shadow: inset 0 0 10px #000;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        /* Active Day Styling */
        .energy-box.active {
            border-color: var(--neon-yellow);
            box-shadow: 0 0 10px var(--neon-yellow), inset 0 0 10px #000;
        }

        .energy-fill {
            width: 100%;
            height: 0%; /* JS will animate this */
            background: linear-gradient(to top, var(--neon-blue), var(--neon-green));
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 0 15px var(--neon-green);
        }

        /* Dim past days */
        .energy-box:not(.active) .energy-fill {
            filter: grayscale(0.6) opacity(0.7);
        }
        .energy-box.active .energy-fill {
            filter: none;
        }

        /* Bubbles/Liquid effect on top of fill */
        .energy-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.5);
        }

        .step-count-mini {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.5rem;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
            z-index: 2;
            width: 100%;
            text-align: center;
            opacity: 0.8;
            pointer-events: none;
        }

        /* --- Modals --- */
        #result-modal, #confirm-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        .modal-content {
            background: #111;
            border: 4px solid var(--neon-yellow);
            padding: 30px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 0 30px var(--neon-yellow);
            position: relative;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-content.danger {
            border-color: var(--danger-red);
            box-shadow: 0 0 30px var(--danger-red);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            color: var(--neon-yellow);
            margin-bottom: 20px;
            font-size: 1.2rem;
            line-height: 1.5;
        }
        
        .danger .modal-title {
            color: var(--danger-red);
        }

        .discount-badge {
            font-size: 3rem;
            color: var(--neon-green);
            margin: 20px 0;
            text-shadow: 4px 4px 0 #000;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        /* --- Floating Message --- */
        #floating-message {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 8px;
            border: 1px solid white;
            font-size: 0.6rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s, top 0.3s;
            white-space: nowrap;
        }

        /* --- Confetti --- */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
            z-index: 101;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

    </style>
</head>
<body>

    <header>
        <h1>DISCOUNT CASTLE QUEST</h1>
        <div class="subtitle">INPUT STEPS. WALK FAR. SAVE GOLD.</div>
    </header>

    <!-- Game World -->
    <div id="game-stage">
        <div class="stars"></div>
        <div class="mountains" id="mountains"></div>
        
        <!-- Castle SVG -->
        <div class="castle-container">
            <svg class="castle-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                <rect x="30" y="40" width="40" height="60" fill="#555" />
                <rect x="10" y="20" width="20" height="80" fill="#444" />
                <rect x="70" y="20" width="20" height="80" fill="#444" />
                <rect x="10" y="10" width="20" height="10" fill="#666" />
                <rect x="70" y="10" width="20" height="10" fill="#666" />
                <rect x="42" y="70" width="16" height="30" fill="#220" />
                <rect x="15" y="30" width="10" height="10" fill="#ff0" />
                <rect x="75" y="30" width="10" height="10" fill="#ff0" />
                <line x1="50" y1="40" x2="50" y2="10" stroke="#fff" stroke-width="2" />
                <polygon points="50,10 70,20 50,30" fill="#f00" />
            </svg>
        </div>

        <!-- Hero SVG -->
        <div id="hero">
            <svg class="hero-svg" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                <rect x="5" y="6" width="6" height="6" fill="#00f3ff" />
                <rect x="5" y="12" width="2" height="3" fill="#0000aa" />
                <rect x="9" y="12" width="2" height="3" fill="#0000aa" />
                <rect x="4" y="6" width="1" height="4" fill="#00f3ff" />
                <rect x="11" y="6" width="1" height="4" fill="#00f3ff" />
                <rect x="5" y="2" width="6" height="4" fill="#ffccaa" />
                <rect x="5" y="2" width="6" height="1" fill="#555" />
                <rect x="9" y="3" width="1" height="1" fill="#000" />
            </svg>
            <div id="floating-message">Let's go!</div>
        </div>

        <div class="ground"></div>
    </div>

    <!-- Controls -->
    <div class="controls-container">
        <div class="input-group">
            <label for="step-input">ENTER STEPS:</label>
            <input type="number" id="step-input" min="0" placeholder="e.g. 5000">
            <button onclick="processTurn()">WALK!</button>
            <button class="btn-reset" onclick="requestReset()">NEW DAY</button>
        </div>

        <div class="status-panel">
            <div class="status-item">
                DISTANCE (KM)
                <span id="distance-display" style="color: var(--neon-blue)">0.00 km</span>
            </div>
            <div class="status-item" style="text-align: right;">
                CURRENT DISCOUNT
                <span id="discount-preview" style="color: var(--neon-pink)">0%</span>
            </div>
        </div>
    </div>

    <!-- Weekly Dashboard -->
    <div class="dashboard-container">
        <div class="dashboard-title">WEEKLY QUEST LOG</div>
        <div class="week-grid" id="week-grid">
            <!-- Generated by JS -->
        </div>
    </div>

    <!-- Result Modal -->
    <div id="result-modal">
        <div class="modal-content">
            <h2 class="modal-title" id="modal-title">JOURNAL UPDATE</h2>
            <p id="modal-message">You have walked...</p>
            <div class="discount-badge" id="modal-discount">0%</div>
            <p>DISCOUNT UNLOCKED</p>
            <br>
            <button onclick="closeResultModal()">CONTINUE QUEST</button>
        </div>
    </div>

    <!-- Reset Confirmation Modal -->
    <div id="confirm-modal">
        <div class="modal-content danger">
            <h2 class="modal-title">START NEW DAY?</h2>
            <p style="font-size: 0.8rem; line-height: 1.5;">
                This will save today's progress and move to the next day.<br><br>
                <span style="color: var(--neon-yellow)">If it is Sunday, the week will reset.</span>
            </p>
            <div class="modal-buttons">
                <button class="btn-reset" onclick="confirmReset()">YES, NEXT DAY</button>
                <button onclick="closeConfirmModal()">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const STEPS_PER_KM = 1410;
        const MAX_STEPS_FOR_FULL_DISCOUNT = 20000;
        const MAX_PIXEL_TRAVEL = 82;
        
        // Days of week
        const daysOfWeek = ["MON", "TUE", "WED", "THU", "FRI", "SAT", "SUN"];
        
        // --- State ---
        let totalStepsWalked = 0;
        let currentDayIndex = 0; // 0 = Monday
        
        // Initialize empty week (All zeros)
        let weeklySteps = [0, 0, 0, 0, 0, 0, 0];

        // --- DOM Elements ---
        const hero = document.getElementById('hero');
        const mountains = document.getElementById('mountains');
        const stepInput = document.getElementById('step-input');
        const distanceDisplay = document.getElementById('distance-display');
        const discountPreview = document.getElementById('discount-preview');
        const resultModal = document.getElementById('result-modal');
        const confirmModal = document.getElementById('confirm-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalDiscount = document.getElementById('modal-discount');
        const weekGrid = document.getElementById('week-grid');
        const floatingMsg = document.getElementById('floating-message');

        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', () => {
            renderDashboard();
        });

        // --- Event Listeners ---
        stepInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                processTurn();
            }
        });

        // --- Helper Functions ---
        const formatNum = (num) => num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");

        function calculateDiscount(steps) {
            if (steps < 5000) return 0;
            if (steps < 10000) return 5;
            if (steps < 15000) return 10;
            if (steps < 20000) return 20;
            return 30;
        }

        function getDiscountColor(discount) {
            if(discount === 0) return '#777';
            if(discount === 5) return '#00f3ff';
            if(discount === 10) return '#fcee0a';
            if(discount === 20) return '#ff00ff';
            return '#00ff41';
        }

        function showFloatText(text) {
            floatingMsg.innerText = text;
            floatingMsg.style.opacity = 1;
            floatingMsg.style.top = "-40px";
            setTimeout(() => {
                floatingMsg.style.opacity = 0;
                floatingMsg.style.top = "-30px";
            }, 1500);
        }

        // --- Dashboard Logic ---

        function renderDashboard() {
            weekGrid.innerHTML = ''; // Clear existing
            
            weeklySteps.forEach((steps, index) => {
                const isActive = index === currentDayIndex;
                
                // Container
                const col = document.createElement('div');
                col.className = 'day-column';

                // Label
                const label = document.createElement('div');
                label.className = 'day-label' + (isActive ? ' active' : '');
                label.innerText = daysOfWeek[index];
                col.appendChild(label);

                // Energy Box
                const box = document.createElement('div');
                box.className = 'energy-box' + (isActive ? ' active' : '');

                // Fill
                const fill = document.createElement('div');
                fill.className = 'energy-fill';
                
                // Calculate height percentage
                let percent = (steps / MAX_STEPS_FOR_FULL_DISCOUNT) * 100;
                if(percent > 100) percent = 100;
                
                fill.style.height = `${percent}%`;

                // Text Counter
                const countText = document.createElement('div');
                countText.className = 'step-count-mini';
                // Show steps if active or has history, otherwise dash
                countText.innerText = (isActive || steps > 0) ? formatNum(steps) : '-';

                box.appendChild(fill);
                box.appendChild(countText);
                col.appendChild(box);
                weekGrid.appendChild(col);
            });
        }

        // --- Gameplay Logic ---

        function processTurn() {
            const inputVal = parseInt(stepInput.value);

            if (isNaN(inputVal) || inputVal <= 0) {
                showFloatText("Invalid Steps!");
                stepInput.value = '';
                return;
            }

            const stepsWalkedThisTurn = inputVal;
            const prevTotal = totalStepsWalked;
            totalStepsWalked += stepsWalkedThisTurn;

            // Update Dashboard Data for the CURRENT active day
            weeklySteps[currentDayIndex] = totalStepsWalked;
            renderDashboard();

            // Animation
            hero.classList.add('walking');
            showFloatText(`+${formatNum(stepsWalkedThisTurn)} Steps!`);

            // Visual Movement
            let progressPercentage = (totalStepsWalked / MAX_STEPS_FOR_FULL_DISCOUNT) * 100;
            if (progressPercentage > MAX_PIXEL_TRAVEL) progressPercentage = MAX_PIXEL_TRAVEL;

            hero.style.left = `calc(10px + ${progressPercentage}%)`;

            const screenWidth = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0);
            const parallaxOffset = (progressPercentage / 100) * (screenWidth * 0.5); 
            mountains.style.transform = `translateX(-${parallaxOffset}px)`;

            // UI Updates
            const km = (totalStepsWalked / STEPS_PER_KM).toFixed(2);
            distanceDisplay.innerText = `${km} km`;
            
            const newDiscount = calculateDiscount(totalStepsWalked);
            discountPreview.innerText = `${newDiscount}%`;
            discountPreview.style.color = getDiscountColor(newDiscount);

            // Result Delay
            setTimeout(() => {
                hero.classList.remove('walking');
                showResult(stepsWalkedThisTurn, newDiscount, prevTotal, km);
            }, 1000);
        }

        function showResult(stepsAdded, currentDiscount, prevTotal, km) {
            let title = "JOURNAL UPDATE";
            let msg = `You walked <span style="color:white">${formatNum(stepsAdded)}</span> steps.<br>Total Distance: <span style="color:var(--neon-blue)">${km} km</span>.`;
            
            const reachedCastle = totalStepsWalked >= MAX_STEPS_FOR_FULL_DISCOUNT;
            const wasPreviouslyUnder = prevTotal < MAX_STEPS_FOR_FULL_DISCOUNT;

            if (reachedCastle && wasPreviouslyUnder) {
                title = "CASTLE REACHED!";
                msg = "The Merchant is impressed by your endurance!<br>You have unlocked the MAXIMUM DISCOUNT!";
                launchConfetti();
            } else if (stepsAdded >= 5000) {
                title = "LONG DISTANCE WALKER!";
            } else if (currentDiscount === 0 && prevTotal < 5000 && totalStepsWalked >= 5000) {
                title = "EFFORT RECOGNIZED";
                msg = "You are moving! A small discount appears.";
            }

            modalTitle.innerText = title;
            modalMessage.innerHTML = msg;
            modalDiscount.innerText = `${currentDiscount}%`;
            modalDiscount.style.color = getDiscountColor(currentDiscount);
            
            resultModal.style.display = 'flex';
        }

        function closeResultModal() {
            resultModal.style.display = 'none';
            stepInput.value = '';
            stepInput.focus();
        }

        // --- Reset Logic (New Day) ---

        function requestReset() {
            confirmModal.style.display = 'flex';
        }

        function closeConfirmModal() {
            confirmModal.style.display = 'none';
        }

        function confirmReset() {
            // 1. Save today's final score to history
            weeklySteps[currentDayIndex] = totalStepsWalked;

            // 2. Move to next day
            currentDayIndex++;

            // 3. Check if week is over (Sunday -> Monday)
            if (currentDayIndex >= 7) {
                currentDayIndex = 0; // Reset to Monday
                weeklySteps = [0, 0, 0, 0, 0, 0, 0]; // Clear all history
                showFloatText("NEW WEEK STARTED!");
            } else {
                showFloatText(`Moved to ${daysOfWeek[currentDayIndex]}!`);
            }

            // 4. Reset active running total
            totalStepsWalked = 0;

            // 5. Update Visuals
            // Ensure the new "Today" slot in history is 0 (it already is from reset or init)
            weeklySteps[currentDayIndex] = 0; 
            
            renderDashboard();
            
            hero.style.left = '10px';
            mountains.style.transform = 'translateX(0)';
            
            const km = 0;
            distanceDisplay.innerText = `0.00 km`;
            discountPreview.innerText = `0%`;
            discountPreview.style.color = getDiscountColor(0);

            closeConfirmModal();
        }

        // --- Effects ---
        function launchConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#0ff', '#f0f', '#fff'];
            const confettiCount = 100;

            for (let i = 0; i < confettiCount; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                const bg = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100 + 'vw';
                const animDuration = Math.random() * 2 + 2 + 's'; 
                const size = Math.random() * 10 + 5 + 'px';

                conf.style.backgroundColor = bg;
                conf.style.left = left;
                conf.style.animationDuration = animDuration;
                conf.style.width = size;
                conf.style.height = size;
                
                document.body.appendChild(conf);

                setTimeout(() => {
                    conf.remove();
                }, 4000);
            }
        }

    </script>
</body>
</html>
